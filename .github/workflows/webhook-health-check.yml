name: Webhook Health Check

on:
  schedule:
    # Every 5 minutes. GitHub Actions cron runs in UTC.
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  health-check:
    name: GET /api/webhooks/revenuecat/health
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          REVENUECAT_WEBHOOK_SECRET: ${{ secrets.REVENUECAT_WEBHOOK_SECRET }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "::error::API_BASE_URL secret is not set. Add it in GitHub → Settings → Secrets."
            exit 1
          fi

          HEALTH_URL="${API_BASE_URL}/api/webhooks/revenuecat/health"
          echo "Checking $HEALTH_URL"

          HTTP_CODE=$(curl -s -o /tmp/health_body.json -w "%{http_code}" \
            -H "Authorization: ${REVENUECAT_WEBHOOK_SECRET}" \
            "$HEALTH_URL")

          echo "HTTP status: $HTTP_CODE"
          echo "Response body:"
          cat /tmp/health_body.json

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Health check returned HTTP $HTTP_CODE (expected 200). The RevenueCat webhook path may be down."
            exit 1
          fi

          OK_FIELD=$(python3 -c "import json,sys; d=json.load(open('/tmp/health_body.json')); print(str(d.get('ok','')).lower())")
          if [ "$OK_FIELD" != "true" ]; then
            echo "::error::Health check returned HTTP 200 but ok != true. Response: $(cat /tmp/health_body.json)"
            exit 1
          fi

          SECRET_CONFIGURED=$(python3 -c "import json,sys; d=json.load(open('/tmp/health_body.json')); print(str(d.get('secretConfigured','')).lower())")
          if [ "$SECRET_CONFIGURED" != "true" ]; then
            echo "::error::Webhook secret is not configured on the server (secretConfigured=false). Set the REVENUECAT_WEBHOOK_SECRET Replit secret — without it the endpoint accepts unauthenticated calls and real purchases may be silently dropped."
            exit 1
          fi

          echo "Health check passed (ok=true, secretConfigured=true)."

      - name: Write failure summary
        if: failure()
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PAGERDUTY_INTEGRATION_KEY: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
        run: |
          HEALTH_URL="${API_BASE_URL}/api/webhooks/revenuecat/health"
          RESPONSE_BODY=""
          if [ -f /tmp/health_body.json ]; then
            RESPONSE_BODY=$(cat /tmp/health_body.json)
          fi

          PD_LINK=""
          if [ -n "$PAGERDUTY_INTEGRATION_KEY" ]; then
            PD_LINK="- 🔴 **PagerDuty:** [Open active incidents](https://app.pagerduty.com)"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
          ## ❌ RevenueCat Webhook Health Check Failed

          **Endpoint:** \`${HEALTH_URL}\`

          **Raw response:**
          \`\`\`json
          ${RESPONSE_BODY:-<no response body — endpoint may be unreachable>}
          \`\`\`

          ## 🔧 On-call runbook

          Work through these steps in order until the health check passes again:

          1. **Check Replit deploy status**
             - Open the Replit project and verify the API Server workflow is running.
             - If it is stopped or crashed, restart it and wait ~30 s for the health check to re-run.

          2. **Verify the \`REVENUECAT_WEBHOOK_SECRET\` secret**
             - In Replit → Secrets, confirm \`REVENUECAT_WEBHOOK_SECRET\` is set and non-empty.
             - In GitHub → Settings → Secrets, confirm the same value is stored as \`REVENUECAT_WEBHOOK_SECRET\`.
             - A \`secretConfigured: false\` response body means the Replit secret is missing or empty.

          3. **Check recent deployments**
             - If a recent deploy broke the server, use the OTA rollback runbook:
               \`\`\`bash
               pnpm run eas:rollback:production
               \`\`\`
             - Re-deploy the API server after fixing the root cause.

          4. **Escalate if unresolved within 15 minutes**
          ${PD_LINK}
             - Trigger a manual PagerDuty alert if automated paging did not fire.
             - Page the on-call engineer directly and start an incident channel.

          ---
          *Workflow run: [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          SUMMARY

      - name: Auto-resolve PagerDuty incident on success
        if: success()
        env:
          PAGERDUTY_INTEGRATION_KEY: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
        run: |
          if [ -z "$PAGERDUTY_INTEGRATION_KEY" ]; then
            echo "PAGERDUTY_INTEGRATION_KEY is not set — skipping PagerDuty resolve. Add it in GitHub → Settings → Secrets to enable auto-resolve."
            exit 0
          fi

          HTTP_CODE=$(curl -s -o /tmp/pd_resolve_response.json -w "%{http_code}" \
            -X POST "https://events.pagerduty.com/v2/enqueue" \
            -H "Content-Type: application/json" \
            --data "{
              \"routing_key\": \"${PAGERDUTY_INTEGRATION_KEY}\",
              \"event_action\": \"resolve\",
              \"dedup_key\": \"revenuecat-webhook-health\"
            }")

          echo "PagerDuty resolve response (HTTP $HTTP_CODE):"
          cat /tmp/pd_resolve_response.json

          if [ "$HTTP_CODE" != "202" ]; then
            echo "::warning::PagerDuty resolve submission returned HTTP $HTTP_CODE (expected 202). Check the integration key."
          else
            echo "PagerDuty incident resolved successfully."
          fi

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not set — skipping Slack alert. Add it in GitHub → Settings → Secrets to enable paging."
            exit 0
          fi

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "{
              \"text\": \":rotating_light: *RevenueCat webhook is DOWN*\",
              \"attachments\": [
                {
                  \"color\": \"danger\",
                  \"fields\": [
                    {
                      \"title\": \"Endpoint\",
                      \"value\": \"${{ secrets.API_BASE_URL }}/api/webhooks/revenuecat/health\",
                      \"short\": false
                    },
                    {
                      \"title\": \"Run\",
                      \"value\": \"<${RUN_URL}|View failed workflow run>\",
                      \"short\": false
                    }
                  ],
                  \"footer\": \"Webhook Health Check · ${{ github.repository }}\",
                  \"ts\": $(date +%s)
                }
              ]
            }"

      - name: Page on-call via PagerDuty on failure
        if: failure()
        env:
          PAGERDUTY_INTEGRATION_KEY: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
        run: |
          if [ -z "$PAGERDUTY_INTEGRATION_KEY" ]; then
            echo "PAGERDUTY_INTEGRATION_KEY is not set — skipping PagerDuty alert. Add it in GitHub → Settings → Secrets to enable phone/SMS paging."
            exit 0
          fi

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          HTTP_CODE=$(curl -s -o /tmp/pd_response.json -w "%{http_code}" \
            -X POST "https://events.pagerduty.com/v2/enqueue" \
            -H "Content-Type: application/json" \
            --data "{
              \"routing_key\": \"${PAGERDUTY_INTEGRATION_KEY}\",
              \"event_action\": \"trigger\",
              \"dedup_key\": \"revenuecat-webhook-health\",
              \"payload\": {
                \"summary\": \"RevenueCat webhook health check FAILED — ${{ secrets.API_BASE_URL }}/api/webhooks/revenuecat/health\",
                \"source\": \"${{ github.repository }} / webhook-health-check\",
                \"severity\": \"critical\",
                \"custom_details\": {
                  \"run_url\": \"${RUN_URL}\",
                  \"repository\": \"${{ github.repository }}\",
                  \"workflow\": \"${{ github.workflow }}\"
                }
              },
              \"links\": [
                {
                  \"href\": \"${RUN_URL}\",
                  \"text\": \"View failed workflow run\"
                }
              ]
            }")

          echo "PagerDuty response (HTTP $HTTP_CODE):"
          cat /tmp/pd_response.json

          if [ "$HTTP_CODE" != "202" ]; then
            echo "::warning::PagerDuty event submission returned HTTP $HTTP_CODE (expected 202). Check the integration key."
          else
            echo "PagerDuty incident triggered successfully."
          fi
