name: EAS Update

on:
  push:
    branches:
      - main
      - preview
      - staging
    paths:
      - "artifacts/mobile/**"
      - "lib/**"
      - "pnpm-workspace.yaml"
      - "package.json"

jobs:
  # Runs on every qualifying push (main, preview, staging).
  # Testers on TestFlight/internal tracks receive OTA fixes here first.
  update-preview:
    name: Publish OTA → preview channel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm --filter @workspace/mobile install --frozen-lockfile

      - name: Publish EAS Update (preview)
        working-directory: artifacts/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli update --branch preview --message "$(git log -1 --pretty=%s)" --non-interactive

  # Only runs on main, and only after update-preview succeeds.
  # This ensures every production OTA has already been validated by testers.
  update-production:
    name: Publish OTA → production channel
    runs-on: ubuntu-latest
    needs: update-preview
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm --filter @workspace/mobile install --frozen-lockfile

      - name: Publish EAS Update (production)
        working-directory: artifacts/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli update --branch production --message "$(git log -1 --pretty=%s)" --non-interactive
