name: EAS Update

on:
  push:
    branches:
      - main

jobs:
  update:
    name: Publish OTA update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm --filter @workspace/mobile install --frozen-lockfile

      - name: Publish EAS Update (production)
        working-directory: artifacts/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli update --branch production --message "$(git log -1 --pretty=%s)" --non-interactive
