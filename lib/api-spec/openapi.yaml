openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: atlas
    description: Atlas AI goal coaching endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /atlas/onboarding-chat:
    post:
      operationId: atlasOnboardingChat
      tags: [atlas]
      summary: Continue an adaptive onboarding conversation for the chosen goal model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingChatRequest"
      responses:
        "200":
          description: Next assistant turn
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingChatResponse"

  /atlas/intake-questions:
    post:
      operationId: atlasIntakeQuestions
      tags: [atlas]
      summary: Generate a tailored intake questionnaire for the user's goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeQuestionsRequest"
      responses:
        "200":
          description: Generated questionnaire
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeQuestionsResponse"

  /atlas/intake-submit:
    post:
      operationId: atlasIntakeSubmit
      tags: [atlas]
      summary: Convert intake answers into a complete UserProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeSubmitRequest"
      responses:
        "200":
          description: Built UserProfile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeSubmitResponse"

  /atlas/roadmap:
    post:
      operationId: atlasGenerateRoadmap
      tags: [atlas]
      summary: Generate a personalized multi-phase roadmap from the user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoadmapRequest"
      responses:
        "200":
          description: Generated roadmap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Roadmap"

  /atlas/daily-plan:
    post:
      operationId: atlasGenerateDailyPlan
      tags: [atlas]
      summary: Generate today's actionable execution plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyPlanRequest"
      responses:
        "200":
          description: Today's plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPlan"

  /atlas/coach:
    post:
      operationId: atlasCoach
      tags: [atlas]
      summary: Conversational coaching reply with full execution context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoachRequest"
      responses:
        "200":
          description: Coach reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachResponse"

  /atlas/adapt:
    post:
      operationId: atlasAdaptPlan
      tags: [atlas]
      summary: Adapt the plan based on behavioural performance data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdaptRequest"
      responses:
        "200":
          description: Adaptive recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdaptResponse"

  /atlas/behavioral-profile:
    post:
      operationId: atlasBehavioralProfile
      tags: [atlas]
      summary: Build or update the cumulative behavioural identity profile from history and reflections
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BehavioralProfileRequest"
      responses:
        "200":
          description: Updated behavioural profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BehavioralProfileResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GoalType:
      type: string
      enum:
        - ielts
        - car
        - programming
        - fitness
        - finance
        - custom

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required: [role, content]

    UserProfile:
      type: object
      properties:
        goalType:
          $ref: "#/components/schemas/GoalType"
        customGoalTitle:
          type: string
          description: User-supplied goal title; only set when goalType is "custom".
        goalStatement:
          type: string
        currentLevel:
          type: string
        availableTimePerDayMinutes:
          type: integer
        financialCondition:
          type: string
        productivityPattern:
          type: string
        consistencyLevel:
          type: string
        constraints:
          type: array
          items:
            type: string
        targetTimelineWeeks:
          type: integer
        notes:
          type: string
      required:
        - goalType
        - goalStatement
        - currentLevel
        - availableTimePerDayMinutes
        - financialCondition
        - productivityPattern
        - consistencyLevel
        - constraints
        - targetTimelineWeeks
        - notes

    IntakeQuestionType:
      type: string
      enum:
        - short_text
        - long_text
        - single_select
        - multi_select
        - number

    IntakeQuestion:
      type: object
      properties:
        id:
          type: string
          description: Stable identifier used as the answer key.
        label:
          type: string
          description: The question shown to the user.
        helper:
          type: string
          description: Optional helper subtext giving context.
        type:
          $ref: "#/components/schemas/IntakeQuestionType"
        placeholder:
          type: string
        options:
          type: array
          description: Required for single_select / multi_select question types.
          items:
            type: string
        unit:
          type: string
          description: Optional unit hint for number questions (e.g. "minutes", "weeks").
        required:
          type: boolean
      required: [id, label, type, required]

    IntakeQuestionsRequest:
      type: object
      properties:
        goalType:
          $ref: "#/components/schemas/GoalType"
        goalTitle:
          type: string
          description: User-supplied free-form goal description.
      required: [goalType, goalTitle]

    IntakeQuestionsResponse:
      type: object
      properties:
        introMessage:
          type: string
          description: One short sentence Atlas says before the questions.
        questions:
          type: array
          items:
            $ref: "#/components/schemas/IntakeQuestion"
      required: [introMessage, questions]

    IntakeAnswer:
      type: object
      properties:
        questionId:
          type: string
        value:
          type: string
          description: Stringified answer (single value, comma-joined for multi_select, numeric as string).
      required: [questionId, value]

    IntakeSubmitRequest:
      type: object
      properties:
        goalType:
          $ref: "#/components/schemas/GoalType"
        goalTitle:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/IntakeQuestion"
        answers:
          type: array
          items:
            $ref: "#/components/schemas/IntakeAnswer"
      required: [goalType, goalTitle, questions, answers]

    IntakeSubmitResponse:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        followUp:
          type: string
          description: Optional short note Atlas wants to add before generating the roadmap.
      required: [profile]

    OnboardingChatRequest:
      type: object
      properties:
        goalType:
          $ref: "#/components/schemas/GoalType"
        customGoalTitle:
          type: string
          description: User-supplied goal title; required when goalType is "custom".
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required: [goalType, history]

    OnboardingChatResponse:
      type: object
      properties:
        message:
          type: string
        isComplete:
          type: boolean
        profile:
          oneOf:
            - $ref: "#/components/schemas/UserProfile"
            - type: "null"
      required: [message, isComplete]

    RoadmapRequest:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
      required: [profile]

    RoadmapMilestone:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        weekNumber:
          type: integer
      required: [id, title, description, weekNumber]

    RoadmapPhase:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        focus:
          type: string
        startWeek:
          type: integer
        endWeek:
          type: integer
        milestones:
          type: array
          items:
            $ref: "#/components/schemas/RoadmapMilestone"
      required: [id, title, focus, startWeek, endWeek, milestones]

    Roadmap:
      type: object
      properties:
        goalType:
          $ref: "#/components/schemas/GoalType"
        headline:
          type: string
        summary:
          type: string
        totalWeeks:
          type: integer
        strategy:
          type: string
        riskAnalysis:
          type: array
          items:
            type: string
        phases:
          type: array
          items:
            $ref: "#/components/schemas/RoadmapPhase"
      required:
        - goalType
        - headline
        - summary
        - totalWeeks
        - strategy
        - riskAnalysis
        - phases

    BehavioralSnapshot:
      type: object
      properties:
        completedTaskTitles:
          type: array
          items:
            type: string
        missedTaskTitles:
          type: array
          items:
            type: string
        currentStreakDays:
          type: integer
        completionRate:
          type: number
        recentNotes:
          type: array
          items:
            type: string
      required:
        - completedTaskTitles
        - missedTaskTitles
        - currentStreakDays
        - completionRate
        - recentNotes

    DailyPlanRequest:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        roadmap:
          $ref: "#/components/schemas/Roadmap"
        behavioral:
          $ref: "#/components/schemas/BehavioralSnapshot"
        learnedProfile:
          oneOf:
            - $ref: "#/components/schemas/BehavioralProfile"
            - type: "null"
          description: Cumulative behavioural identity model. Optional — sent when the user has accumulated reflections.
        date:
          type: string
        currentWeek:
          type: integer
      required: [profile, roadmap, behavioral, date, currentWeek]

    DailyTask:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        durationMinutes:
          type: integer
        category:
          type: string
        priority:
          type: string
          enum: [critical, high, normal]
      required:
        - id
        - title
        - description
        - durationMinutes
        - category
        - priority

    DailyPlan:
      type: object
      properties:
        date:
          type: string
        focusOfTheDay:
          type: string
        coachNote:
          type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/DailyTask"
      required: [date, focusOfTheDay, coachNote, tasks]

    CoachRequest:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        roadmap:
          $ref: "#/components/schemas/Roadmap"
        todayPlan:
          $ref: "#/components/schemas/DailyPlan"
        behavioral:
          $ref: "#/components/schemas/BehavioralSnapshot"
        learnedProfile:
          oneOf:
            - $ref: "#/components/schemas/BehavioralProfile"
            - type: "null"
          description: Cumulative behavioural identity model. Optional.
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        message:
          type: string
      required: [profile, roadmap, behavioral, history, message]

    CoachResponse:
      type: object
      properties:
        reply:
          type: string
      required: [reply]

    AdaptRequest:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        roadmap:
          $ref: "#/components/schemas/Roadmap"
        behavioral:
          $ref: "#/components/schemas/BehavioralSnapshot"
      required: [profile, roadmap, behavioral]

    AdaptResponse:
      type: object
      properties:
        difficultyAdjustment:
          type: string
          enum: [easier, same, harder]
        adjustments:
          type: array
          items:
            type: string
        encouragement:
          type: string
      required: [difficultyAdjustment, adjustments, encouragement]

    BehavioralProfile:
      type: object
      description: Cumulative behavioural identity model the AI builds over time from history and reflections.
      properties:
        summary:
          type: string
          description: 2-3 sentence narrative description of how this user functions psychologically and operationally.
        consistencyLevel:
          type: string
          enum: [very_low, low, moderate, high, very_high]
        workloadTolerance:
          type: string
          enum: [light, moderate, heavy]
        motivationTrend:
          type: string
          enum: [rising, steady, declining]
        focusStyle:
          type: string
          description: e.g. "deep blocks", "short sprints", "context-switcher"
        learningPreference:
          type: string
          description: e.g. "practical-first", "theoretical-then-practice", "mixed"
        peakHours:
          type: array
          description: Time windows when the user is most productive, e.g. ["07:00-09:00", "20:00-22:00"].
          items:
            type: string
        failurePatterns:
          type: array
          description: Recurring reasons tasks get missed, e.g. "low energy after work".
          items:
            type: string
        strengths:
          type: array
          description: What this user is reliably good at, e.g. "morning execution", "short focused sessions".
          items:
            type: string
        recommendedAdjustments:
          type: array
          description: Concrete short imperatives the planner should apply.
          items:
            type: string
        updatedAt:
          type: string
      required:
        - summary
        - consistencyLevel
        - workloadTolerance
        - motivationTrend
        - focusStyle
        - learningPreference
        - peakHours
        - failurePatterns
        - strengths
        - recommendedAdjustments
        - updatedAt

    ReflectionReasonTag:
      type: string
      enum:
        - easy
        - just_right
        - tough
        - skipped
        - energized
        - tired
        - distracted
        - focused
        - no_time
        - blocked

    ReflectionEntry:
      type: object
      properties:
        taskId:
          type: string
        taskTitle:
          type: string
        date:
          type: string
        completed:
          type: boolean
        reasonTag:
          $ref: "#/components/schemas/ReflectionReasonTag"
        note:
          type: string
        reflectedAt:
          type: string
      required: [taskId, taskTitle, date, completed, reflectedAt]

    BehavioralProfileRequest:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        recentHistory:
          type: array
          description: Last ~60 task history entries (taskTitle, date, completed).
          items:
            type: object
            properties:
              taskId:
                type: string
              taskTitle:
                type: string
              date:
                type: string
              completed:
                type: boolean
            required: [taskId, taskTitle, date, completed]
        reflections:
          type: array
          description: Last ~20 reflection entries.
          items:
            $ref: "#/components/schemas/ReflectionEntry"
        previous:
          oneOf:
            - $ref: "#/components/schemas/BehavioralProfile"
            - type: "null"
          description: Existing behavioural profile, if any, to evolve from.
      required: [profile, recentHistory, reflections]

    BehavioralProfileResponse:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/BehavioralProfile"
        aiInsight:
          type: string
          description: One short sentence the user sees as a fresh insight after a refresh.
      required: [profile, aiInsight]
