openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: atlas
    description: Atlas AI goal coaching endpoints
  - name: me
    description: Authenticated user state and profile
  - name: google-calendar
    description: Google Calendar integration via Replit connector
  - name: legal
    description: Versioned Privacy Policy and Terms of Service acceptance
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Current authenticated user (identity + tier)
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/state:
    get:
      operationId: getMeState
      tags: [me]
      summary: Full personal state for the signed-in user (goals, prefs, draft)
      responses:
        "200":
          description: User state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeStateResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: putMeState
      tags: [me]
      summary: Replace personal state with optimistic locking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeStateRequest"
      responses:
        "200":
          description: Updated state with new version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeStateResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Version conflict — fetch latest before retrying
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeStateConflictResponse"

  /atlas/onboarding-chat:
    post:
      operationId: atlasOnboardingChat
      tags: [atlas]
      summary: Continue an adaptive onboarding conversation for the chosen goal model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingChatRequest"
      responses:
        "200":
          description: Next assistant turn
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingChatResponse"

  /atlas/intake-questions:
    post:
      operationId: atlasIntakeQuestions
      tags: [atlas]
      summary: Generate a tailored intake questionnaire for the user's goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeQuestionsRequest"
      responses:
        "200":
          description: Generated questionnaire
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeQuestionsResponse"

  /atlas/intake-submit:
    post:
      operationId: atlasIntakeSubmit
      tags: [atlas]
      summary: Convert intake answers into a complete UserProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeSubmitRequest"
      responses:
        "200":
          description: Built UserProfile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeSubmitResponse"

  /atlas/roadmap:
    post:
      operationId: atlasGenerateRoadmap
      tags: [atlas]
      summary: Generate a personalized multi-phase roadmap from the user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoadmapRequest"
      responses:
        "200":
          description: Generated roadmap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Roadmap"

  /atlas/daily-plan:
    post:
      operationId: atlasGenerateDailyPlan
      tags: [atlas]
      summary: Generate today's actionable execution plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyPlanRequest"
      responses:
        "200":
          description: Today's plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPlan"

  /atlas/generate-title:
    post:
      operationId: atlasGenerateTitle
      tags: [atlas]
      summary: Refine a raw user goal description into a short brand-neutral title
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateTitleRequest"
      responses:
        "200":
          description: AI-refined goal title
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateTitleResponse"

  /atlas/coach:
    post:
      operationId: atlasCoach
      tags: [atlas]
      summary: Conversational coaching reply with full execution context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoachRequest"
      responses:
        "200":
          description: Coach reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachResponse"

  /atlas/transcribe:
    post:
      operationId: atlasTranscribe
      tags: [atlas]
      summary: Transcribe a short voice clip into text via Whisper
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/TranscribeRequest"
      responses:
        "200":
          description: Transcribed text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscribeResponse"

  /atlas/analyze-reflection-image:
    post:
      operationId: atlasAnalyzeReflectionImage
      tags: [atlas]
      summary: Run a one-shot vision pass on a reflection photo and return a short text analysis stored on the reflection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeReflectionImageRequest"
      responses:
        "200":
          description: Plain-prose analysis used by all downstream reflection-aware AI calls
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeReflectionImageResponse"

  /atlas/adapt:
    post:
      operationId: atlasAdaptPlan
      tags: [atlas]
      summary: Adapt the plan based on behavioural performance data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdaptRequest"
      responses:
        "200":
          description: Adaptive recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdaptResponse"

  /atlas/behavioral-profile:
    post:
      operationId: atlasBehavioralProfile
      tags: [atlas]
      summary: Build or update the cumulative behavioural identity profile from history and reflections
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BehavioralProfileRequest"
      responses:
        "200":
          description: Updated behavioural profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BehavioralProfileResponse"

  /atlas/evolve-roadmap:
    post:
      operationId: atlasEvolveRoadmap
      tags: [atlas]
      summary: Evolve the existing roadmap based on the learned profile, behaviour and reflections
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoadmapEvolutionRequest"
      responses:
        "200":
          description: Evolved roadmap with structured change summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoadmapEvolutionResponse"

  /atlas/push-token:
    post:
      operationId: atlasRegisterPushToken
      tags: [atlas]
      summary: Register or update the device's Expo push token for the signed-in user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPushTokenBody"
      responses:
        "200":
          description: Token saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterPushTokenResponse"

  /atlas/push-test:
    post:
      operationId: atlasSendTestPush
      tags: [atlas]
      summary: Send a test push notification to the signed-in user's registered device
      responses:
        "200":
          description: Push attempted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendTestPushResponse"

  /google-calendar/status:
    get:
      operationId: googleCalendarStatus
      tags: [google-calendar]
      summary: Whether the Google Calendar connector is currently reachable
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GCalStatus"

  /google-calendar/calendars:
    get:
      operationId: googleCalendarList
      tags: [google-calendar]
      summary: List writable Google calendars
      responses:
        "200":
          description: Writable calendars
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GCalListResult"
        "503":
          description: Connector unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /google-calendar/today-events:
    get:
      operationId: googleCalendarTodayEvents
      tags: [google-calendar]
      summary: Today's events on a Google calendar
      parameters:
        - in: query
          name: calendarId
          required: true
          schema:
            type: string
        - in: query
          name: timeZone
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Today's events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GCalEventsResult"
        "503":
          description: Connector unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /google-calendar/sync-plan:
    post:
      operationId: googleCalendarSyncPlan
      tags: [google-calendar]
      summary: Write daily plan tasks to a Google calendar back-to-back from now
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GCalSyncPlanInput"
      responses:
        "200":
          description: Write summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GCalSyncPlanResult"

  /legal/current:
    get:
      operationId: legalCurrentVersions
      tags: [legal]
      summary: Current versions of each legal document and the supported locales
      responses:
        "200":
          description: Versions and locales
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalCurrentResponse"

  /legal/document:
    get:
      operationId: legalGetDocument
      tags: [legal]
      summary: Full text of a legal document in a given locale
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [privacy_policy, terms_of_service]
        - name: locale
          in: query
          required: false
          schema:
            type: string
            enum: [en, az, ru, ar, zh, es]
      responses:
        "200":
          description: Document text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalDocumentResponse"
        "400":
          description: Invalid type or locale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /legal/me:
    get:
      operationId: legalMyAcceptances
      tags: [legal]
      summary: Latest acceptance per document for the signed-in user
      responses:
        "200":
          description: Acceptance state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalAcceptancesState"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /legal/accept:
    post:
      operationId: legalAccept
      tags: [legal]
      summary: Record acceptance of one or more legal documents at their current versions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LegalAcceptInput"
      responses:
        "200":
          description: Updated acceptance state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalAcceptancesState"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    GCalStatus:
      type: object
      properties:
        available:
          type: boolean
      required: [available]

    GoogleCalendarLite:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        source:
          type: string
        color:
          type: string
        allowsModifications:
          type: boolean
        primary:
          type: boolean
      required: [id, title, source, color, allowsModifications, primary]

    GCalListResult:
      type: object
      properties:
        calendars:
          type: array
          items:
            $ref: "#/components/schemas/GoogleCalendarLite"
      required: [calendars]

    GoogleCalendarEventLite:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        allDay:
          type: boolean
        location:
          oneOf:
            - type: string
            - type: "null"
        notes:
          oneOf:
            - type: string
            - type: "null"
      required: [id, title, startDate, endDate, allDay]

    GCalEventsResult:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/GoogleCalendarEventLite"
      required: [events]

    GCalSyncPlanInput:
      type: object
      properties:
        calendarId:
          type: string
        timeZone:
          type: string
        tasks:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              description:
                type: string
              durationMinutes:
                type: integer
            required: [title]
      required: [calendarId, tasks]

    GCalSyncPlanResult:
      type: object
      properties:
        written:
          type: integer
        eventIds:
          type: array
          items:
            type: string
        successIndices:
          description: Input task indices (0-based) that were successfully written.
          type: array
          items:
            type: integer
      required: [written, eventIds, successIndices]

    MeResponse:
      type: object
      description: Public-safe identity and tier for the signed-in user.
      properties:
        clerkUserId:
          type: string
        email:
          oneOf:
            - type: string
            - type: "null"
        tier:
          type: string
          description: Server-side subscription tier. "free" today; later "pro" etc.
      required: [clerkUserId, email, tier]

    MeStateGoalBlob:
      type: object
      description: Opaque per-goal blob (profile, roadmap, history, plans, reflections, learnedProfile, evolutions, coachMemory, etc). Schema enforced client-side.
      additionalProperties: true

    MeStateAccountPrefsBlob:
      type: object
      description: Opaque account preferences blob. Schema enforced client-side.
      additionalProperties: true

    MeStateDraftBlob:
      type: object
      description: Opaque pending intake draft blob. Schema enforced client-side.
      additionalProperties: true

    MeStateResponse:
      type: object
      properties:
        clerkUserId:
          type: string
        email:
          oneOf:
            - type: string
            - type: "null"
        tier:
          type: string
        goals:
          type: array
          items:
            $ref: "#/components/schemas/MeStateGoalBlob"
        activeGoalId:
          oneOf:
            - type: string
            - type: "null"
        accountPrefs:
          $ref: "#/components/schemas/MeStateAccountPrefsBlob"
        pendingDraft:
          oneOf:
            - $ref: "#/components/schemas/MeStateDraftBlob"
            - type: "null"
        version:
          type: integer
          description: Monotonic version used for optimistic concurrency. Bumped on every successful PUT.
      required: [clerkUserId, email, tier, goals, activeGoalId, accountPrefs, pendingDraft, version]

    MeStateRequest:
      type: object
      properties:
        goals:
          type: array
          items:
            $ref: "#/components/schemas/MeStateGoalBlob"
        activeGoalId:
          oneOf:
            - type: string
            - type: "null"
        accountPrefs:
          $ref: "#/components/schemas/MeStateAccountPrefsBlob"
        pendingDraft:
          oneOf:
            - $ref: "#/components/schemas/MeStateDraftBlob"
            - type: "null"
        expectedVersion:
          type: integer
          description: The version the client believes is current. If it doesn't match, the server returns 409 with the latest state.
      required: [goals, activeGoalId, accountPrefs, pendingDraft, expectedVersion]

    MeStateConflictResponse:
      type: object
      properties:
        error:
          type: string
        latest:
          $ref: "#/components/schemas/MeStateResponse"
      required: [error, latest]

    GoalType:
      type: string
      enum:
        - ielts
        - car
        - programming
        - fitness
        - finance
        - custom

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required: [role, content]

    UserProfile:
      type: object
      properties:
        goalType:
          $ref: "#/components/schemas/GoalType"
        customGoalTitle:
          type: string
          description: User-supplied goal title; only set when goalType is "custom".
        goalStatement:
          type: string
        currentLevel:
          type: string
        availableTimePerDayMinutes:
          type: integer
        financialCondition:
          type: string
        productivityPattern:
          type: string
        consistencyLevel:
          type: string
        constraints:
          type: array
          items:
            type: string
        targetTimelineWeeks:
          type: integer
        notes:
          type: string
      required:
        - goalType
        - goalStatement
        - currentLevel
        - availableTimePerDayMinutes
        - financialCondition
        - productivityPattern
        - consistencyLevel
        - constraints
        - targetTimelineWeeks
        - notes

    IntakeQuestionType:
      type: string
      enum:
        - short_text
        - long_text
        - single_select
        - multi_select
        - number

    IntakeQuestion:
      type: object
      properties:
        id:
          type: string
          description: Stable identifier used as the answer key.
        label:
          type: string
          description: The question shown to the user.
        helper:
          type: string
          description: Optional helper subtext giving context.
        type:
          $ref: "#/components/schemas/IntakeQuestionType"
        placeholder:
          type: string
        options:
          type: array
          description: Required for single_select / multi_select question types.
          items:
            type: string
        unit:
          type: string
          description: Optional unit hint for number questions (e.g. "minutes", "weeks").
        required:
          type: boolean
      required: [id, label, type, required]

    GenerateTitleRequest:
      type: object
      properties:
        goalType:
          $ref: "#/components/schemas/GoalType"
        userInput:
          type: string
          description: The raw, free-form goal text the user typed.
        intent:
          type: string
          description: Optional extra context the AI should use (e.g. first intake answer summary).
      required: [goalType, userInput]

    GenerateTitleResponse:
      type: object
      properties:
        title:
          type: string
          description: A short (2-5 words) brand-neutral title for the goal.
      required: [title]

    IntakeQuestionsRequest:
      type: object
      properties:
        goalType:
          $ref: "#/components/schemas/GoalType"
        goalTitle:
          type: string
          description: User-supplied free-form goal description.
      required: [goalType, goalTitle]

    IntakeQuestionsResponse:
      type: object
      properties:
        introMessage:
          type: string
          description: One short sentence Atlas says before the questions.
        questions:
          type: array
          items:
            $ref: "#/components/schemas/IntakeQuestion"
      required: [introMessage, questions]

    IntakeAnswer:
      type: object
      properties:
        questionId:
          type: string
        value:
          type: string
          description: Stringified answer (single value, comma-joined for multi_select, numeric as string).
      required: [questionId, value]

    IntakeSubmitRequest:
      type: object
      properties:
        goalType:
          $ref: "#/components/schemas/GoalType"
        goalTitle:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/IntakeQuestion"
        answers:
          type: array
          items:
            $ref: "#/components/schemas/IntakeAnswer"
      required: [goalType, goalTitle, questions, answers]

    IntakeSubmitResponse:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        followUp:
          type: string
          description: Optional short note Atlas wants to add before generating the roadmap.
      required: [profile]

    OnboardingChatRequest:
      type: object
      properties:
        goalType:
          $ref: "#/components/schemas/GoalType"
        customGoalTitle:
          type: string
          description: User-supplied goal title; required when goalType is "custom".
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required: [goalType, history]

    OnboardingChatResponse:
      type: object
      properties:
        message:
          type: string
        isComplete:
          type: boolean
        profile:
          oneOf:
            - $ref: "#/components/schemas/UserProfile"
            - type: "null"
      required: [message, isComplete]

    RoadmapRequest:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
      required: [profile]

    RoadmapMilestone:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        weekNumber:
          type: integer
      required: [id, title, description, weekNumber]

    RoadmapPhase:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        focus:
          type: string
        startWeek:
          type: integer
        endWeek:
          type: integer
        milestones:
          type: array
          items:
            $ref: "#/components/schemas/RoadmapMilestone"
      required: [id, title, focus, startWeek, endWeek, milestones]

    Roadmap:
      type: object
      properties:
        goalType:
          $ref: "#/components/schemas/GoalType"
        headline:
          type: string
        summary:
          type: string
        totalWeeks:
          type: integer
        strategy:
          type: string
        riskAnalysis:
          type: array
          items:
            type: string
        phases:
          type: array
          items:
            $ref: "#/components/schemas/RoadmapPhase"
      required:
        - goalType
        - headline
        - summary
        - totalWeeks
        - strategy
        - riskAnalysis
        - phases

    BehavioralSnapshot:
      type: object
      properties:
        completedTaskTitles:
          type: array
          items:
            type: string
        missedTaskTitles:
          type: array
          items:
            type: string
        currentStreakDays:
          type: integer
        completionRate:
          type: number
        recentNotes:
          type: array
          items:
            type: string
      required:
        - completedTaskTitles
        - missedTaskTitles
        - currentStreakDays
        - completionRate
        - recentNotes

    DailyPlanRequest:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        roadmap:
          $ref: "#/components/schemas/Roadmap"
        behavioral:
          $ref: "#/components/schemas/BehavioralSnapshot"
        learnedProfile:
          oneOf:
            - $ref: "#/components/schemas/BehavioralProfile"
            - type: "null"
          description: Cumulative behavioural identity model. Optional — sent when the user has accumulated reflections.
        date:
          type: string
        currentWeek:
          type: integer
        calendarContext:
          type: string
          description: Optional summary of the user's calendar events for today. Used to schedule plan around existing meetings.
      required: [profile, roadmap, behavioral, date, currentWeek]

    DailyTask:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        durationMinutes:
          type: integer
        category:
          type: string
        priority:
          type: string
          enum: [critical, high, normal]
      required:
        - id
        - title
        - description
        - durationMinutes
        - category
        - priority

    DailyPlan:
      type: object
      properties:
        date:
          type: string
        focusOfTheDay:
          type: string
        coachNote:
          type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/DailyTask"
      required: [date, focusOfTheDay, coachNote, tasks]

    RoadmapEvolutionEntry:
      type: object
      description: One historical roadmap evolution. The mobile app stores up to 10 of these per goal.
      properties:
        evolvedAt:
          type: string
        trigger:
          type: string
          enum: [manual, auto]
        changeSummary:
          type: string
        rationale:
          type: string
        phaseChanges:
          type: array
          items:
            $ref: "#/components/schemas/PhaseChange"
      required: [evolvedAt, trigger, changeSummary, rationale, phaseChanges]

    CurrentPhaseSnapshot:
      type: object
      description: A read-only snapshot of which roadmap phase the user is currently in.
      properties:
        id:
          type: string
        title:
          type: string
        focus:
          type: string
        startWeek:
          type: integer
        endWeek:
          type: integer
        weekIntoPhase:
          type: integer
          description: 1-indexed week number within this phase.
      required: [id, title, focus, startWeek, endWeek, weekIntoPhase]

    CoachMemory:
      type: object
      description: Long-term memory the coach maintains across conversations. Persists past the chat history cap.
      properties:
        summary:
          type: string
          description: A 1-3 sentence rolling summary of what we've talked about and what matters to this user.
        facts:
          type: array
          description: Durable personal facts the user has shared (e.g. "has a knee injury", "works night shifts"). Capped at 20.
          items:
            type: string
        updatedAt:
          oneOf:
            - type: string
            - type: "null"
      required: [summary, facts, updatedAt]

    CoachActionSuggestion:
      type: object
      description: An optional one-tap action the coach is recommending alongside the reply.
      properties:
        kind:
          type: string
          enum: [evolve_roadmap, refresh_insights, reflect_on_task, none]
        label:
          type: string
          description: Button text shown to the user (e.g. "Evolve roadmap now").
        rationale:
          type: string
          description: One-sentence why, shown next to the button.
      required: [kind, label, rationale]

    CoachMemoryUpdate:
      type: object
      description: An optional patch the coach proposes to its long-term memory. Only included when something durable was learned this turn.
      properties:
        summary:
          type: string
          description: New rolling summary that replaces the previous one.
        newFacts:
          type: array
          description: Brand-new facts to append to the facts list. Should not duplicate existing facts.
          items:
            type: string
      required: [summary, newFacts]

    CoachRequest:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        roadmap:
          $ref: "#/components/schemas/Roadmap"
        todayPlan:
          $ref: "#/components/schemas/DailyPlan"
        behavioral:
          $ref: "#/components/schemas/BehavioralSnapshot"
        learnedProfile:
          oneOf:
            - $ref: "#/components/schemas/BehavioralProfile"
            - type: "null"
          description: Cumulative behavioural identity model. Optional.
        currentWeek:
          type: integer
          description: Which week of the journey the user is currently in (1-indexed). Optional.
        currentPhase:
          oneOf:
            - $ref: "#/components/schemas/CurrentPhaseSnapshot"
            - type: "null"
          description: The roadmap phase the user is currently inside. Optional.
        recentReflections:
          type: array
          description: Last few reflections the user submitted. Used to ground tone and advice.
          items:
            $ref: "#/components/schemas/ReflectionEntry"
        recentEvolutions:
          type: array
          description: Last 1-3 roadmap evolutions, most recent first.
          items:
            $ref: "#/components/schemas/RoadmapEvolutionEntry"
        coachMemory:
          oneOf:
            - $ref: "#/components/schemas/CoachMemory"
            - type: "null"
          description: Long-term coach memory persisted across sessions. Optional.
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        message:
          type: string
        modelChoice:
          type: string
          enum: [smart, fast]
          description: Optional model preference. "smart" (default) uses the high-quality model; "fast" uses a lower-latency one.
        attachmentNote:
          type: string
          description: Optional note about an attachment the user added this turn (e.g. an image filename). The reply should acknowledge it.
        calendarContext:
          type: string
          description: Optional summary of the user's calendar events for today. Helps the coach reason about availability.
        attachmentImage:
          oneOf:
            - $ref: "#/components/schemas/CoachAttachmentImage"
            - type: "null"
          description: Optional inline image the coach should look at this turn. Triggers a vision-capable model.
      required: [profile, roadmap, behavioral, history, message]

    RegisterPushTokenBody:
      type: object
      description: Register the device's Expo push token so the server can send daily nudges.
      properties:
        token:
          type: string
          description: An ExponentPushToken[xxx] string returned by expo-notifications.
        tzOffsetMinutes:
          type: integer
          description: Minutes east of UTC at the time of registration. Optional.
      required: [token]

    RegisterPushTokenResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    SendTestPushResponse:
      type: object
      properties:
        ok:
          type: boolean
        delivered:
          type: boolean
          description: True when the Expo push service accepted the message.
      required: [ok, delivered]

    CoachAttachmentImage:
      type: object
      description: Inline image bytes shipped with a single coach turn. Not persisted server-side.
      properties:
        base64Data:
          type: string
          description: Raw base64-encoded image bytes with no data URL prefix.
        mimeType:
          type: string
          description: Image MIME type, e.g. image/jpeg or image/png.
      required: [base64Data, mimeType]

    TranscribeRequest:
      type: object
      required: [audio]
      properties:
        audio:
          type: string
          format: binary
          description: Audio file (m4a / webm / wav / mp3). Should be under ~25MB.
        language:
          type: string
          description: Optional ISO-639-1 hint to bias recognition.

    TranscribeResponse:
      type: object
      required: [text]
      properties:
        text:
          type: string

    CoachTaskPatch:
      type: object
      description: Partial edit applied to an existing daily task. Null fields are left unchanged.
      properties:
        title:
          oneOf:
            - type: string
            - type: "null"
        description:
          oneOf:
            - type: string
            - type: "null"
        durationMinutes:
          oneOf:
            - type: integer
            - type: "null"
        category:
          oneOf:
            - type: string
            - type: "null"
        priority:
          oneOf:
            - type: string
              enum: [critical, high, normal]
            - type: "null"
      required: [title, description, durationMinutes, category, priority]

    CoachCalendarEvent:
      type: object
      description: A single calendar event the coach can add on the user's behalf.
      properties:
        title:
          type: string
        notes:
          oneOf:
            - type: string
            - type: "null"
        startISO:
          oneOf:
            - type: string
            - type: "null"
        durationMinutes:
          oneOf:
            - type: integer
            - type: "null"
      required: [title, notes, startISO, durationMinutes]

    ProposedCoachAction:
      type: object
      description: A concrete plan/goal/calendar-modifying action the AI applies instantly (with Undo).
      properties:
        kind:
          type: string
          enum:
            [
              addTaskToday,
              addTasksToday,
              removeTaskToday,
              editTaskToday,
              renameGoal,
              lightenToday,
              regenerateDay,
              syncToCalendar,
              addCalendarEvent,
            ]
        label:
          type: string
        rationale:
          type: string
        task:
          oneOf:
            - $ref: "#/components/schemas/DailyTask"
            - type: "null"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/DailyTask"
        taskPatch:
          oneOf:
            - $ref: "#/components/schemas/CoachTaskPatch"
            - type: "null"
        taskId:
          oneOf:
            - type: string
            - type: "null"
        taskTitle:
          oneOf:
            - type: string
            - type: "null"
        newTitle:
          oneOf:
            - type: string
            - type: "null"
        removeTaskIds:
          type: array
          items:
            type: string
        event:
          oneOf:
            - $ref: "#/components/schemas/CoachCalendarEvent"
            - type: "null"
      required: [kind, label, rationale]

    CoachResponse:
      type: object
      properties:
        reply:
          type: string
        suggestedReplies:
          type: array
          description: 0-3 short tappable follow-up prompts the user can send back. Each must be <= 50 chars and reference real context.
          items:
            type: string
        actionSuggestion:
          oneOf:
            - $ref: "#/components/schemas/CoachActionSuggestion"
            - type: "null"
          description: Optional CTA for a concrete app action. Use kind=none (or null) when no action fits.
        proposedAction:
          oneOf:
            - $ref: "#/components/schemas/ProposedCoachAction"
            - type: "null"
          description: Optional plan/goal/calendar-modifying action the client applies instantly (with an Undo affordance); null when no action fits.
        memoryUpdate:
          oneOf:
            - $ref: "#/components/schemas/CoachMemoryUpdate"
            - type: "null"
          description: Optional update to long-term coach memory. Only set when the user revealed something durable this turn.
      required: [reply, suggestedReplies, actionSuggestion, proposedAction, memoryUpdate]

    AdaptRequest:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        roadmap:
          $ref: "#/components/schemas/Roadmap"
        behavioral:
          $ref: "#/components/schemas/BehavioralSnapshot"
      required: [profile, roadmap, behavioral]

    AdaptResponse:
      type: object
      properties:
        difficultyAdjustment:
          type: string
          enum: [easier, same, harder]
        adjustments:
          type: array
          items:
            type: string
        encouragement:
          type: string
      required: [difficultyAdjustment, adjustments, encouragement]

    BehavioralProfile:
      type: object
      description: Cumulative behavioural identity model the AI builds over time from history and reflections.
      properties:
        summary:
          type: string
          description: 2-3 sentence narrative description of how this user functions psychologically and operationally.
        consistencyLevel:
          type: string
          enum: [very_low, low, moderate, high, very_high]
        workloadTolerance:
          type: string
          enum: [light, moderate, heavy]
        motivationTrend:
          type: string
          enum: [rising, steady, declining]
        focusStyle:
          type: string
          description: e.g. "deep blocks", "short sprints", "context-switcher"
        learningPreference:
          type: string
          description: e.g. "practical-first", "theoretical-then-practice", "mixed"
        peakHours:
          type: array
          description: Time windows when the user is most productive, e.g. ["07:00-09:00", "20:00-22:00"].
          items:
            type: string
        failurePatterns:
          type: array
          description: Recurring reasons tasks get missed, e.g. "low energy after work".
          items:
            type: string
        strengths:
          type: array
          description: What this user is reliably good at, e.g. "morning execution", "short focused sessions".
          items:
            type: string
        recommendedAdjustments:
          type: array
          description: Concrete short imperatives the planner should apply.
          items:
            type: string
        updatedAt:
          type: string
      required:
        - summary
        - consistencyLevel
        - workloadTolerance
        - motivationTrend
        - focusStyle
        - learningPreference
        - peakHours
        - failurePatterns
        - strengths
        - recommendedAdjustments
        - updatedAt

    ReflectionReasonTag:
      type: string
      enum:
        - easy
        - just_right
        - tough
        - skipped
        - energized
        - tired
        - distracted
        - focused
        - no_time
        - blocked

    ReflectionEntry:
      type: object
      properties:
        taskId:
          type: string
        taskTitle:
          type: string
        date:
          type: string
        completed:
          type: boolean
        reasonTag:
          $ref: "#/components/schemas/ReflectionReasonTag"
        note:
          type: string
        noteAudioTranscript:
          type: string
          description: Whisper-transcribed text from a voice note attached to this reflection. Audio bytes are not stored.
        noteImageAnalysis:
          type: string
          description: One-paragraph vision analysis produced once on submit. Other AI steps consume this text instead of the raw image.
        reflectedAt:
          type: string
      required: [taskId, taskTitle, date, completed, reflectedAt]

    AnalyzeReflectionImageRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: "Base64-encoded image bytes (no data: prefix)."
        imageMimeType:
          type: string
          description: One of image/jpeg, image/png, image/webp, image/gif.
        taskTitle:
          type: string
        completed:
          type: boolean
        reasonTag:
          $ref: "#/components/schemas/ReflectionReasonTag"
        note:
          type: string
      required: [imageBase64, imageMimeType, taskTitle, completed]

    AnalyzeReflectionImageResponse:
      type: object
      properties:
        analysis:
          type: string
          description: Plain-prose paragraph the AI sees on every downstream reflection-aware call.
      required: [analysis]

    BehavioralProfileRequest:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        recentHistory:
          type: array
          description: Last ~60 task history entries (taskTitle, date, completed, optional focusMinutes).
          items:
            type: object
            properties:
              taskId:
                type: string
              taskTitle:
                type: string
              date:
                type: string
              completed:
                type: boolean
              focusMinutes:
                type: integer
                description: Real focused-work minutes accumulated on this task entry, if tracked.
            required: [taskId, taskTitle, date, completed]
        reflections:
          type: array
          description: Last ~20 reflection entries.
          items:
            $ref: "#/components/schemas/ReflectionEntry"
        previous:
          oneOf:
            - $ref: "#/components/schemas/BehavioralProfile"
            - type: "null"
          description: Existing behavioural profile, if any, to evolve from.
      required: [profile, recentHistory, reflections]

    BehavioralProfileResponse:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/BehavioralProfile"
        aiInsight:
          type: string
          description: One short sentence the user sees as a fresh insight after a refresh.
      required: [profile, aiInsight]

    PhaseChangeType:
      type: string
      enum: [added, removed, modified, unchanged]

    PhaseChange:
      type: object
      description: Structured per-phase summary of how the roadmap changed.
      properties:
        phaseId:
          type: string
        phaseTitle:
          type: string
        changeType:
          $ref: "#/components/schemas/PhaseChangeType"
        summary:
          type: string
          description: One sentence explaining what changed for this phase, in plain language.
      required: [phaseId, phaseTitle, changeType, summary]

    RoadmapEvolutionRequest:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        currentRoadmap:
          $ref: "#/components/schemas/Roadmap"
        behavioral:
          $ref: "#/components/schemas/BehavioralSnapshot"
        learnedProfile:
          oneOf:
            - $ref: "#/components/schemas/BehavioralProfile"
            - type: "null"
          description: Cumulative learned behavioural profile, if available.
        recentReflections:
          type: array
          description: Last ~20 reflections.
          items:
            $ref: "#/components/schemas/ReflectionEntry"
        currentWeek:
          type: integer
          description: Which week of the plan the user is currently on.
        trigger:
          type: string
          enum: [manual, auto]
          description: Whether this evolution was user-initiated or automatic.
      required: [profile, currentRoadmap, behavioral, recentReflections, currentWeek, trigger]

    RoadmapEvolutionResponse:
      type: object
      properties:
        evolvedRoadmap:
          $ref: "#/components/schemas/Roadmap"
        hasChanged:
          type: boolean
          description: False when the roadmap should remain as-is (no meaningful evolution warranted).
        changeSummary:
          type: string
          description: One short paragraph (under 60 words) summarizing what was changed and why, in plain language.
        phaseChanges:
          type: array
          description: One entry per phase in the evolved roadmap describing how it changed.
          items:
            $ref: "#/components/schemas/PhaseChange"
        rationale:
          type: string
          description: Brief explanation of the reasoning the AI used (under 80 words).
        evolvedAt:
          type: string
      required: [evolvedRoadmap, hasChanged, changeSummary, phaseChanges, rationale, evolvedAt]

    LegalDocumentType:
      type: string
      enum: [privacy_policy, terms_of_service]

    LegalLocale:
      type: string
      enum: [en, az, ru, ar, zh, es]

    LegalCurrentVersionEntry:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/LegalDocumentType"
        version:
          type: string
      required: [type, version]

    LegalCurrentResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/LegalCurrentVersionEntry"
        supportedLocales:
          type: array
          items:
            $ref: "#/components/schemas/LegalLocale"
        fallbackLocale:
          $ref: "#/components/schemas/LegalLocale"
      required: [documents, supportedLocales, fallbackLocale]

    LegalDocumentResponse:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/LegalDocumentType"
        version:
          type: string
        locale:
          $ref: "#/components/schemas/LegalLocale"
        title:
          type: string
        body:
          type: string
        authoritativeNotice:
          type:
            - string
            - "null"
          description: Convenience-translation notice when the requested locale is not the authoritative one (English).
      required: [type, version, locale, title, body, authoritativeNotice]

    LegalAcceptanceRecord:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/LegalDocumentType"
        acceptedVersion:
          type:
            - string
            - "null"
        currentVersion:
          type: string
        acceptedAt:
          type:
            - string
            - "null"
        locale:
          type:
            - string
            - "null"
        upToDate:
          type: boolean
      required: [type, acceptedVersion, currentVersion, acceptedAt, locale, upToDate]

    LegalAcceptancesState:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/LegalAcceptanceRecord"
        allUpToDate:
          type: boolean
      required: [documents, allUpToDate]

    LegalAcceptItem:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/LegalDocumentType"
        version:
          type: string
      required: [type, version]

    LegalAcceptInput:
      type: object
      properties:
        locale:
          $ref: "#/components/schemas/LegalLocale"
        documents:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/LegalAcceptItem"
      required: [locale, documents]
